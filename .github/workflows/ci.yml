name: Node CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests
      - name: Run tests
        run: npm test

      # 5. Build Docker image
      - name: Build Docker Image
        run: docker build -t node-ci-demo .

      # 6. Run container (basic validation)
      - name: Run Docker Container
        run: docker run -d -p 3000:3000 node-ci-demo

      # 7. Health check
      - name: Test Application
        run: |
          sleep 5
          curl http://localhost:3000/health
