name: Node CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build Docker Image
        run: docker build -t my-app-demo .

      - name: Run Container
        run: docker run -d -p 3000:3000 my-app-demo

      - name: Test App
        run: |
          sleep 5
          curl http://localhost:3000/health
